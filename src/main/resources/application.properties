# Verantwortungsbereich: Gemeinsame Konfiguration der Anwendung.
# Autorinnen: Zeynep Ünver und Nilüfer Civelek

spring.application.name=chatapp

# Database configuration with local H2 fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:chatdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# File Upload Directory
app.upload.dir=${UPLOAD_DIR:./media/}
